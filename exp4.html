<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .login-container {
            width: 350px;
            margin: 80px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .forgot {
            text-align: right;
            margin-bottom: 15px;
        }
        .forgot a {
            text-decoration: none;
            color: #007bff;
            font-size: 14px;
        }
        .forgot a:hover {
            text-decoration: underline;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <form>
        <label>Username</label>
        <input type="text" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" placeholder="Enter password" required>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
